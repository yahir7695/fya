version: "2"
run:
  concurrency: 4
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - dupl
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - gochecknoinits
    - gocritic
    - gocyclo
    - godoclint
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - modernize
    - nakedret
    - nestif
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - perfsprint
    - predeclared
    - prealloc
    - reassign
    - revive
    - sqlclosecheck
    - staticcheck
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
    - wrapcheck

  settings:
    gosec:
      excludes:
        - G115 # integer overflow uintptr->int, standard fd conversion pattern
        - G118 # context cancel not called, false positives on goroutines/callbacks/returns
        - G204 # subprocess with variable, core functionality of the tool
        - G702 # command injection via taint analysis, same as G204 for newer gosec versions
        - G703 # path traversal taint analysis, config paths from trusted sources
        - G705 # XSS taint analysis, CLI stdout and JSON API responses
        - G706 # log injection taint analysis, logs to stderr
    exhaustive:
      default-signifies-exhaustive: true
    nolintlint:
      require-explanation: true
      require-specific: true
    dupl:
      threshold: 100
    gocritic:
      disabled-checks:
        - wrapperFunc
        - hugeParam
        - rangeValCopy
      enabled-tags:
        - performance
        - style
        - experimental
    gocyclo:
      min-complexity: 20
    govet:
      enable:
        - shadow
    lll:
      line-length: 140
    misspell:
      locale: US
    revive:
      rules:
        - name: early-return
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: empty-block
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    rules:
      - linters:
          - golint
        text: should have a package comment, unless it's in another file for this package
      - linters:
          - gocritic
        text: "exitAfterDefer:"
      - linters:
          - gocritic
        text: "whyNoLint: include an explanation for nolint directive"
      - linters:
          - revive
        text: should have a package comment
      - linters:
          - staticcheck
        text: at least one file in a package should have a package comment
      - linters:
          - gocritic
        text: "commentedOutCode: may want to remove commented-out code"
      - linters:
          - gocritic
        text: "unnamedResult: consider giving a name to these results"
      - linters:
          - revive
        text: "var-naming: don't use an underscore in package name"
      - linters:
          - staticcheck
        text: should not use underscores in package names
      - linters:
          - govet
        text: struct literal uses unkeyed fields
      - linters:
          - revive
          - unparam
          - unused
        path: _test\.go$
        text: unused-parameter
      - linters:
          - dupl
          - noctx
          - usestdlibvars
          - gosec
        path: _test\.go$
      - linters:
          - errcheck
        text: "Error return value of .*.Close.*is not checked"
      - linters:
          - errcheck
        text: "Error return value of .*.Fprintf.*is not checked"
      - linters:
          - errcheck
        text: "Error return value of .*.Printf.*is not checked"
      - linters:
          - errcheck
        text: "Error return value of .*.Println.*is not checked"
      - linters:
          - errcheck
        text: "Error return value of .*.Fprintln.*is not checked"
      - linters:
          - errcheck
        source: "w\\.log\\("
      - linters:
          - gosec
        text: "G104: Errors unhandled"
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
