name: ci

on:
  push:
    branches:
    tags:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: set up go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: test
        run: make test

      - name: build
        run: make build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
