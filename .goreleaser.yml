version: 2

builds:
  - id: fya
    main: ./app
    binary: fya
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.revision={{.Tag}}-{{.ShortCommit}}-{{ trimsuffix (replace (replace .CommitDate "-" "") ":" "") "Z" }}

archives:
  - id: fya
    ids:
      - fya
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: fya
    package_name: fya
    ids:
      - fya
    vendor: umputun
    homepage: https://github.com/umputun/fya
    maintainer: umputun
    description: Claude Code print-mode wrapper backed by an interactive PTY session
    license: MIT
    formats:
      - deb
      - rpm
